---
- name: Cisco Switch Backup with Git Auto-Commit
  hosts: switches
  gather_facts: no
  serial: 1

  vars:
#    backup_dir: "/runner/project/backups"

  tasks:

    - name: Collect switch facts
      cisco.ios.ios_facts:

    - name: Backup running config
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          dir_path: "{{ backup_dir }}"
          filename: "{{ inventory_hostname }}.cfg"

    - name: Get date/time
      delegate_to: localhost
      run_once: true
      command: date +"%Y-%m-%d_%H-%M-%S"
      register: backup_time

    - name: Git add config
      delegate_to: localhost
      run_once: true
      command: git add .
      args:
        chdir: "{{ backup_dir }}"

    - name: Git commit changes
      delegate_to: localhost
      run_once: true
      command: >
        git commit -m "Auto backup {{ backup_time.stdout }}"
      args:
        chdir: "{{ backup_dir }}"
      register: git_commit
      failed_when: false

    - name: Git push to remote
      delegate_to: localhost
      run_once: true
      command: git push origin main
      args:
        chdir: "{{ backup_dir }}"
      when: git_commit.rc == 0
   
    - name: Git add config
      delegate_to: localhost
      become: false
      run_once: true
      command: git add .
      args:
        chdir: "{{ backup_dir }}"
   
    - name: Git commit changes
      delegate_to: localhost
      become: false
      run_once: true
      command: >
        git commit -m "Auto backup {{ backup_time.stdout }}"
      args:
        chdir: "{{ backup_dir }}"
      register: git_commit
      failed_when: false

    - name: Git push to remote
      delegate_to: localhost
      become: false
      run_once: true
      command: git push origin main
      args:
        chdir: "{{ backup_dir }}"
      when: git_commit.rc == 0

    - name: Ensure backup directory exists
      delegate_to: localhost
      become: false
      run_once: true
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: Initialize git repository if not present
      delegate_to: localhost
      become: false
      run_once: true
      command: git init
      args:
        chdir: "{{ backup_dir }}"
        
    - name: Create backup directory
      delegate_to: localhost
      run_once: true
      become: false
     file:
       path: "{{ backup_dir }}"
       state: directory





