---
- name: Cisco Switch Backup with Git Auto-Commit
  hosts: switches
  gather_facts: no
  serial: 1

  vars:
    backup_dir: "/runner/project/backups"   # AWX host persistent folder

  tasks:

    # 1️⃣ Ensure the backup directory exists on AWX host
    - name: Ensure backup directory exists on AWX host
      delegate_to: localhost
      run_once: true
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"

    # 2️⃣ Initialize git repository if not already present
    - name: Initialize git repository
      delegate_to: localhost
      run_once: true
      command: git init
      args:
        chdir: "{{ backup_dir }}"

    # 3️⃣ Collect switch facts
    - name: Collect switch facts
      cisco.ios.ios_facts:

    # 4️⃣ Backup running config on switch
    - name: Backup running config
      cisco.ios.ios_config:
        backup: yes
      register: switch_backup

    # 5️⃣ Save the backup to AWX host persistent folder
    - name: Save backup to AWX host
      delegate_to: localhost
      copy:
        content: "{{ switch_backup.backup_config }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}.cfg"

    # 6️⃣ Get current date/time for Git commit
    - name: Get date/time
      delegate_to: localhost
      run_once: true
      command: date +"%Y-%m-%d_%H-%M-%S"
      register: backup_time

    # 7️⃣ Git add changes
    - name: Git add backup files
      delegate_to: localhost
      run_once: true
      command: git add .
      args:
        chdir: "{{ backup_dir }}"

    # 8️⃣ Git commit changes
    - name: Git commit changes
      delegate_to: localhost
      run_once: true
      command: git commit -m "Auto backup {{ backup_time.stdout }}"
      args:
        chdir: "{{ backup_dir }}"
      register: git_commit
      failed_when: false

    # 9️⃣ Git push to remote
    - name: Git push to remote
      delegate_to: localhost
      run_once: true
      command: git push origin main
      args:
        chdir: "{{ backup_dir }}"
      when: git_commit.rc == 0

    - name: Ensure backup directory exists
      delegate_to: localhost
      run_once: true
      file:
        path: /runner/project/backups
        state: directory
        mode: '0755'

    - name: Backup running config on switch
      cisco.ios.ios_config:
        backup: yes
        backup_options:
          dir_path: /runner/project/backups
          filename: "{{ inventory_hostname }}.cfg"
